# GitHub Actions workflow — validates Cloudflare Worker observability config
# matches the ChittyOS canonical OTLP-to-chittytrack standard.
#
# Standard enforced (per chittycanon://docs/tech/spec/worker-observability):
#   observability.enabled == true
#   observability.logs.enabled == true
#   observability.logs.destinations includes "chittytrack-logs"
#   observability.traces.enabled == true
#   observability.traces.destinations includes "chittytrack-traces"
#   observability.traces.persist == false
#
# @canon: chittycanon://core/services/chittytrack

name: check-observability

on:
  pull_request:
    paths:
      - "wrangler.toml"
      - "wrangler.json"
      - "wrangler.jsonc"
      - "**/wrangler.toml"
      - "**/wrangler.json"
      - "**/wrangler.jsonc"
  push:
    branches: [main, "fix/**", "feat/**"]
    paths:
      - "wrangler.toml"
      - "wrangler.json"
      - "wrangler.jsonc"

jobs:
  observability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install json5 parser
        run: pip install --user json5
      - name: Validate observability blocks
        run: |
          python3 <<'PY'
          import json, json5, sys, glob, os
          FAILURES = []
          def load(path):
              with open(path) as f:
                  text = f.read()
              if path.endswith(".toml"):
                  try: import tomllib
                  except ImportError: import tomli as tomllib
                  return tomllib.loads(text)
              return json5.loads(text)
          def check(path, data):
              name = data.get("name", os.path.basename(os.path.dirname(path)))
              obs = data.get("observability", {}) or {}
              if not obs.get("enabled"):
                  FAILURES.append(f"{name} ({path}): observability.enabled is not true")
                  return
              logs = obs.get("logs", {}) or {}
              if not logs.get("enabled"):
                  FAILURES.append(f"{name}: observability.logs.enabled is not true")
              if "chittytrack-logs" not in (logs.get("destinations") or []):
                  FAILURES.append(f"{name}: observability.logs.destinations must include 'chittytrack-logs'")
              traces = obs.get("traces", {}) or {}
              if not traces.get("enabled"):
                  FAILURES.append(f"{name}: observability.traces.enabled is not true")
              if "chittytrack-traces" not in (traces.get("destinations") or []):
                  FAILURES.append(f"{name}: observability.traces.destinations must include 'chittytrack-traces'")
              if traces.get("persist") is True:
                  FAILURES.append(f"{name}: observability.traces.persist=true wastes storage")
          configs = set()
          for p in ["wrangler.toml","wrangler.json","wrangler.jsonc","**/wrangler.toml","**/wrangler.json","**/wrangler.jsonc"]:
              for path in glob.glob(p, recursive=True):
                  if "/node_modules/" in path or "/.wrangler/" in path: continue
                  configs.add(os.path.abspath(path))
          if not configs:
              print("No wrangler config files found — skipping"); sys.exit(0)
          for path in sorted(configs):
              try: check(path, load(path))
              except Exception as e: FAILURES.append(f"{path}: parse error — {e}")
          if FAILURES:
              print("\n".join(f"::error::{f}" for f in FAILURES))
              print(f"\n{len(FAILURES)} observability standard violation(s)")
              print("Standard: chittycanon://core/services/chittytrack")
              sys.exit(1)
          print(f"OK — {len(configs)} wrangler config(s) conform to ChittyOS observability standard")
          PY
